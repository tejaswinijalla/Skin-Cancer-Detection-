<!DOCTYPE html>
<html>
<head>
<title>Appointment Confirmed</title>

<style>
body{
font-family:Arial;
background:#f2f6fc;
text-align:center;
}

.box{
background:white;
padding:30px;
width:350px;
margin:auto;
margin-top:50px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="box">

<h2>Appointment Confirmed ✅</h2>

<p><b>Name:</b> {{ name }}</p>
<p><b>Hospital:</b> {{ hospital }}</p>
<p><b>Date:</b> {{ date }}</p>
<p><b>Time:</b> {{ time }}</p>

<p>📧 Confirmation email sent</p>

</div>

</body>
</html>
