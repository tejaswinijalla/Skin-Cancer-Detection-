<!DOCTYPE html>
<html>
<head>

<title>AI Skin Disease Detection</title>

<style>

/* ===== BODY ===== */
body{
font-family:'Segoe UI', Arial;
background: linear-gradient(135deg, #74ebd5, #ACB6E5);
text-align:center;
margin:0;
padding:0;
}

/* ===== HEADINGS ===== */
h2{
margin-top:20px;
color:#333;
}

/* ===== GLASS CONTAINER ===== */
.container{
background: rgba(255,255,255,0.9);
backdrop-filter: blur(10px);
padding:25px;
width:450px;
margin:auto;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.container:hover{
transform: translateY(-3px);
}

/* ===== BUTTON ===== */
button{
padding:10px 18px;
background: linear-gradient(135deg, #2f80ed, #56ccf2);
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform: scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* ===== RESULT BOX ===== */
.result{
margin-top:20px;
padding:10px;
border-radius:10px;
background:#f9fbff;
box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
}

/* ===== HOSPITAL CARDS ===== */
.hospital-container{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
}

.hospital-card{
background:white;
border-radius:15px;
padding:15px;
min-width:240px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.hospital-card:hover{
transform: translateY(-5px) scale(1.02);
}

/* ===== CHAT BUTTON ===== */
.chat-toggle{
position:fixed;
bottom:20px;
right:20px;
background: linear-gradient(135deg, #2f80ed, #56ccf2);
color:white;
border:none;
border-radius:50%;
width:65px;
height:65px;
font-size:26px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* ===== CHAT BOX ===== */
.chat-popup{
position:fixed;
bottom:100px;
right:20px;
width:380px;
height:500px;
background:white;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.25);
display:none;
flex-direction:column;
overflow:hidden;
}

.chat-header{
background: linear-gradient(135deg, #2f80ed, #56ccf2);
color:white;
padding:14px;
font-size:18px;
font-weight:bold;
text-align:left;
}

.chat-body{
flex:1;
overflow-y:auto;
padding:15px;
background:#f5f7fb;
display:flex;
flex-direction:column;
gap:10px;
}

.msg-user{
align-self:flex-end;
max-width:75%;
}

.msg-user span{
background: linear-gradient(135deg, #2f80ed, #56ccf2);
color:white;
padding:10px 14px;
border-radius:15px 15px 5px 15px;
display:inline-block;
}

.msg-ai{
align-self:flex-start;
max-width:75%;
}

.msg-ai span{
background:white;
padding:10px 14px;
border-radius:15px 15px 15px 5px;
display:inline-block;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.chat-footer{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

.chat-footer input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.chat-footer button{
margin-left:8px;
}

/* SMOOTH SCROLL */
html{
scroll-behavior:smooth;
}
.progress {
    width: 100%;
    height: 20px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

#confidenceBar {
    height: 100%;
    width: 0%;
    transition: 0.5s;
}
#confidenceBar {
    transition: width 0.8s ease-in-out;
}
#preview{
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<h2>AI Skin Disease Detection</h2>

<div class="container">

<input type="file" id="image">

<br><br>

<button onclick="detect()">Detect Disease</button>
<button onclick="downloadReport()">Download Report</button>


<div class="result">

<img id="preview" width="200">

<p><b>Disease:</b> <span id="disease"></span></p>

<p><b>Confidence:</b> <span id="confidence"></span></p>

<p><b>Specialist:</b> <span id="specialist"></span></p>

<p><b>Symptoms:</b> <span id="symptoms"></span></p>

<p><b>Precautions:</b> <span id="precautions"></span></p>

<input type="email" id="userEmail" placeholder="Enter your email" style="padding:8px;border-radius:10px;border:1px solid #ccc;">
<button onclick="sendReport()">📧 Send Report</button>

</div>

</div>
<div id="confidenceBox">
    <h3 id="confidenceText"></h3>

    <div class="progress">
        <div id="confidenceBar"></div>
    </div>

    <p id="confidenceMessage"></p>
</div>

<h2>Nearby Hospitals</h2>

<div class="hospital-container" id="hospitals"></div>

<!-- CHAT BUTTON -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- CHAT BOX -->
<div class="chat-popup" id="chatPopup">

<div class="chat-header">AI Doctor</div>

<div class="chat-body" id="chatbox"></div>

<div class="chat-footer">
<input type="text" id="userInput" placeholder="Ask anything...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

let currentDisease = "";

// DETECT
async function detect(){

const file = document.getElementById("image").files[0];

if(!file){
    alert("Please upload an image");
    return;
}

const formData = new FormData();
formData.append("image", file);

// ✅ ONLY ONE API CALL
const res = await fetch("/detect", {
    method: "POST",
    body: formData
});

const data = await res.json();

if(data.error){
    alert(data.error);
    return;
}

// ✅ SHOW IMAGE
document.getElementById("preview").src = data.image;

// ✅ SHOW TEXT DATA
document.getElementById("disease").innerText = data.disease;
document.getElementById("confidence").innerText = data.confidence + "%";
document.getElementById("specialist").innerText = data.specialist;
document.getElementById("symptoms").innerText = data.symptoms;
document.getElementById("precautions").innerText = data.precautions;

currentDisease = data.disease;

// ✅ CONFIDENCE BAR
document.getElementById("confidenceText").innerText =
    "Confidence: " + data.confidence + "%";

let bar = document.getElementById("confidenceBar");
bar.style.width = data.confidence + "%";

let msg = document.getElementById("confidenceMessage");

if (data.confidence_level === "high") {
    bar.style.background = "green";
    msg.innerText = "✔ Reliable Prediction";
}
else if (data.confidence_level === "medium") {
    bar.style.background = "orange";
    msg.innerText = "⚠ Needs Doctor Confirmation";
}
else {
    bar.style.background = "red";
    msg.innerText = "❗ Uncertain Prediction";
}

// ✅ LOAD HOSPITALS
loadHospitals();
}

// HOSPITALS
function loadHospitals(){

navigator.geolocation.getCurrentPosition(async function(position){

const lat=position.coords.latitude
const lon=position.coords.longitude

const res=await fetch("/hospitals",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({lat:lat,lon:lon})
})

const data = await res.json()

const container=document.getElementById("hospitals")
container.innerHTML=""

data.forEach(h=>{
container.innerHTML+=`
<div class="hospital-card">
<h3>${h.name}</h3>
<p>${h.address}</p>
<p>Phone: ${h.phone}</p>
<p>Distance: ${h.distance} km</p>
<a href="https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${h.lat},${h.lon}" target="_blank">
<button>Directions</button>
</a>
<br><br>
<form action="/appointment" method="get">
<input type="hidden" name="hospital" value="${h.name}">
<button type="submit">Book Appointment</button>
</form>
</div>
`
})
})
}

// CHAT
function toggleChat(){
const chat = document.getElementById("chatPopup")
chat.style.display = chat.style.display === "flex" ? "none" : "flex"
}

async function sendMessage(){

const input = document.getElementById("userInput")
const message = input.value

if(!message) return

const chatbox = document.getElementById("chatbox")

chatbox.innerHTML += `<div class="msg-user"><span>${message}</span></div>`

input.value = ""

const id = "t"+Date.now()
chatbox.innerHTML += `<div class="msg-ai" id="${id}"><span>Typing...</span></div>`

const res = await fetch("/chatbot",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({message: message, disease: currentDisease})
})

const data = await res.json()

document.getElementById(id).innerHTML = `<span>${data.reply}</span>`
}
function downloadReport(){

    let disease = document.getElementById("disease").innerText;
    let confidence = document.getElementById("confidence").innerText;
    let specialist = document.getElementById("specialist").innerText;
    let symptoms = document.getElementById("symptoms").innerText;
    let precautions = document.getElementById("precautions").innerText;

    if(!disease){
        alert("Please detect disease first!");
        return;
    }

    let url = `/download_report?disease=${encodeURIComponent(disease)}
    &confidence=${encodeURIComponent(confidence)}
    &specialist=${encodeURIComponent(specialist)}
    &symptoms=${encodeURIComponent(symptoms)}
    &precautions=${encodeURIComponent(precautions)}`;

    window.location.href = url;
}
async function sendReport(){

    let email = document.getElementById("userEmail").value;

    if(!email){
        alert("Please enter email");
        return;
    }

    let disease = document.getElementById("disease").innerText;
    let confidence = document.getElementById("confidence").innerText;
    let specialist = document.getElementById("specialist").innerText;
    let symptoms = document.getElementById("symptoms").innerText;
    let precautions = document.getElementById("precautions").innerText;

    let res = await fetch("/send_report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            email: email,
            disease: disease,
            confidence: confidence,
            specialist: specialist,
            symptoms: symptoms,
            precautions: precautions
        })
    });

    let data = await res.json();

    if(data.status === "success"){
        alert("Report sent successfully ✅");
    }else{
        alert("Failed to send email ❌");
    }
}
</script>

</body>
</html>
